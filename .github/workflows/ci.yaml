name: flutter_ci

on:
  push:
    tags:
      - 'v*'

env:
  PROTOC_VERSION: 34.0
  PROTOC_PLUGIN_VERSION: 25.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.2
          cache: true

      - name: Install Protoc and Dart Protoc Plugin
        run: |
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          sudo unzip -o protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip
          protoc --version
          dart pub global activate protoc_plugin ${PROTOC_PLUGIN_VERSION}
          
      - run: flutter pub get
      
      - name: Generate Proto Files
        run: |
          mkdir -p lib/generated
          mkdir -p android/app/src/main/java/com/mobilellm/awattackerapplier/proto
          protoc --dart_out=grpc:lib/generated -Iproto proto/window_info.proto proto/accessibility.proto
          protoc --java_out=android/app/src/main/java -Iproto proto/window_info.proto proto/accessibility.proto
      
      - run: flutter gen-l10n
      - run: flutter test
      - run: dart format lib/
      - run: dart fix --apply
      - run: dart analyze --fatal-infos
      - run: dart run import_sorter:main

      - name: Commit format fixes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout HEAD -- pubspec.lock
          git add .
          git commit -m "style: auto format and fix" || echo "No changes to commit"
          git push

      - name: Build APK
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release
      
      - name: Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.AWATTACKER_TOKEN }}
